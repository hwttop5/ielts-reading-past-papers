services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_SELF_HOSTED_SAME_ORIGIN: "1"
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - path: ./deploy/.env
        required: false
    environment:
      PORT: "8787"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__ENABLE_STATIC_CONTENT: "true"
      QDRANT__SERVICE__STATIC_CONTENT_DIR: /qdrant/static
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  qdrant_storage:
