name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vps-ielts-reading-past-papers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p 22 "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          rsync -az --delete --delay-updates \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude 'deploy/.env' \
            --exclude 'deploy/certs/' \
            --exclude 'docker-compose.ip.yml' \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./ "$VPS_USER@$VPS_HOST:/opt/stacks/ielts-reading-past-papers/"

      - name: Restart Docker stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          CONTACT_AD_GITHUB_TOKEN: ${{ secrets.CONTACT_AD_GITHUB_TOKEN }}
          VITE_BAIDU_TONGJI_ID: ${{ vars.VITE_BAIDU_TONGJI_ID }}
        run: |
          set -euo pipefail
          test -n "$VITE_BAIDU_TONGJI_ID"
          escaped_tongji_id=$(printf '%q' "$VITE_BAIDU_TONGJI_ID")
          escaped_contact_ad_github_token=$(printf '%q' "${CONTACT_AD_GITHUB_TOKEN:-}")
          ssh -i ~/.ssh/deploy_key -p 22 "$VPS_USER@$VPS_HOST" \
            "VITE_BAIDU_TONGJI_ID=$escaped_tongji_id CONTACT_AD_GITHUB_TOKEN=$escaped_contact_ad_github_token bash -se" <<'REMOTE'
          set -euo pipefail
          cd /opt/stacks/ielts-reading-past-papers
          mkdir -p deploy
          touch .env
          touch deploy/.env
          sed -i '/^VITE_BAIDU_TONGJI_ID=/d' .env
          printf '%s\n' "VITE_BAIDU_TONGJI_ID=$VITE_BAIDU_TONGJI_ID" >> .env
          sed -i '/^CONTACT_AD_GITHUB_TOKEN=/d' deploy/.env
          if [ -n "${CONTACT_AD_GITHUB_TOKEN:-}" ]; then
            printf '%s\n' "CONTACT_AD_GITHUB_TOKEN=$CONTACT_AD_GITHUB_TOKEN" >> deploy/.env
          fi
          printf '%s\n' "VITE_BAIDU_TONGJI_ID=$VITE_BAIDU_TONGJI_ID" > deploy/vite-build.env
          printf '%s\n' "VITE_BAIDU_TONGJI_ID=$VITE_BAIDU_TONGJI_ID" > .env.production.local
          export VITE_BAIDU_TONGJI_ID
          /opt/stacks/deploy-hooks/deploy-stack.sh ielts-reading-past-papers </dev/null
          for attempt in $(seq 1 30); do
            web_health=$(docker inspect --format '{{.State.Health.Status}}' ielts-reading-past-papers-web-1 2>/dev/null || true)
            test "$web_health" = healthy && break
            sleep 2
          done
          test "$web_health" = healthy
          docker exec -e VITE_BAIDU_TONGJI_ID="$VITE_BAIDU_TONGJI_ID" ielts-reading-past-papers-web-1 sh -lc 'grep -R "$VITE_BAIDU_TONGJI_ID" /usr/share/nginx/html/assets/*.js >/dev/null'
          REMOTE
