name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vps-ielts-reading-past-papers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p 22 "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          rsync -az --delete --delay-updates \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude 'deploy/.env' \
            --exclude 'deploy/certs/' \
            --exclude 'docker-compose.ip.yml' \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./ "$VPS_USER@$VPS_HOST:/opt/stacks/ielts-reading-past-papers/"

      - name: Restart Docker stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p 22 "$VPS_USER@$VPS_HOST" \
            "/opt/stacks/deploy-hooks/deploy-stack.sh ielts-reading-past-papers"
